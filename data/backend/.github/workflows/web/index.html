<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Financial Flow Map – Top 20</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #050810;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    h1 {
      text-align: center;
      padding: 20px 0 5px;
      margin: 0;
    }
    #info {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 20px;
    }
    .tile {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
    .ticker {
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .price {
      font-size: 11px;
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <h1>Top 20 – Money Flow & Demand/Offer</h1>
  <div id="info">Dati reali, aggiornati automaticamente ogni 3 giorni</div>
  <div id="grid"></div>

  <script src="app.js"></script>
</body>
</html>
