name: Build Heatmap

on:
  schedule:
    - cron: "0 0 */3 * *"   # ogni 3 giorni
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas

      - name: Build heatmap data
        run: |
          python backend/build_heatmap.py

      - name: Commit heatmap data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/heatmap_data.json
          git commit -m "Update heatmap data" || echo "No changes"
          git push
